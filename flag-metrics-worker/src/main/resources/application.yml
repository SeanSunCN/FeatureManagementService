server:
  port: 8083

spring:
  application:
    name: flag-metrics-worker
  data:
    redis:
      host: ${REDIS_HOST:192.168.5.66}
      port: ${REDIS_PORT:6379}
      timeout: 3000
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 1
  kafka:
    bootstrap-servers: ${KAFKA_HOST:192.168.5.66}:${KAFKA_PORT:9092}
    consumer:
      group-id: flag-metrics-worker
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  host-ip: ${HOST_IP:192.168.5.66}
  clickhouse:
    # 8123 = ClickHouse HTTP protocol port (JDBC driver uses HTTP)
    # Native protocol port is 9000 (mapped to 19000 on NAS host)
    url: jdbc:clickhouse://${CLICKHOUSE_HOST:192.168.5.66}:${CLICKHOUSE_PORT:8123}/dev
    username: ${CLICKHOUSE_USERNAME:dev}
    password: ${CLICKHOUSE_PASSWORD:E96I3N6RokvAujGXWghCBcfL}
    driver-class: com.clickhouse.jdbc.ClickHouseDriver
  worker:
    flush-interval-ms: ${FLUSH_INTERVAL_MS:10000}
    flush-batch-size: ${FLUSH_BATCH_SIZE:500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.flag: ${LOG_LEVEL:INFO}