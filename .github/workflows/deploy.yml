name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: aliyun

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/aliyun.key
          chmod 600 ~/.ssh/aliyun.key
          printf 'Host aliyun\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/aliyun.key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' \
            "${{ secrets.ALIYUN_HOST }}" \
            "${{ secrets.ALIYUN_USER }}" > ~/.ssh/config

      - name: Execute remote deploy
        run: |
          ssh aliyun "cd ${{ secrets.ALIYUN_PROJECT_DIR }} && PROJECT_DIR=${{ secrets.ALIYUN_PROJECT_DIR }} bash deploy/scripts/deploy.sh"

      - name: Verify deployment health
        run: |
          echo "Waiting for services to stabilize..."
          sleep 15

          ALL_OK=true
          for port in 8080 8081 8082 8083; do
            STATUS=$(ssh aliyun "curl -s -o /dev/null -w '%{http_code}' http://localhost:${port}/actuator/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  [OK] Port ${port} — HEALTHY"
            else
              echo "  [FAIL] Port ${port} — HTTP ${STATUS}"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = "true" ]; then
            echo "All 4 services are healthy!"
          else
            echo "Some services are unhealthy — check server logs."
            exit 1
          fi

      - name: Run integration tests
        run: |
          ssh aliyun "cd ${{ secrets.ALIYUN_PROJECT_DIR }} && python deploy/scripts/integration-test.py \
            http://localhost:8080 \
            http://localhost:8081 \
            http://localhost:8082 \
            http://localhost:8083 \
            5"
