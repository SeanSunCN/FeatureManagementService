name: PR Code Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Verify Code Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven (skip tests for speed)
        run: mvn package -DskipTests -B -V

      - name: Run unit tests
        run: mvn test -B
