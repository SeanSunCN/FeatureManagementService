version: '3.8'

services:
  cdn:
    image: nginx:1.25-alpine
    container_name: flag-cdn
    ports:
      - "8080:80"
    volumes:
      - ./cdn_root:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - flag-network

  flag-admin:
    image: eclipse-temurin:21-jre-alpine
    container_name: flag-admin
    ports:
      - "8081:8081"
    volumes:
      - ./cdn_root:/cdn_root
      - ./flag-admin-app.jar:/app.jar
    working_dir: /
    entrypoint: ["java", "-jar", "/app.jar"]
    environment:
      CDN_ROOT: /cdn_root
      EVAL_SERVICE_URL: http://flag-eval:8082
    depends_on:
      - cdn
    networks:
      - flag-network

networks:
  flag-network:
    driver: bridge
