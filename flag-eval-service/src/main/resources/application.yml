server:
  port: 8081

spring:
  application:
    name: flag-eval-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.5.66}:${DB_PORT:15432}/flag_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:666666}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:192.168.5.66}
      port: ${REDIS_PORT:6379}
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  host-ip: ${HOST_IP:192.168.5.66}
  cdn:
    source-url: http://${app.host-ip}:${server.port}/api/v1/eval/flags
  sse:
    heartbeat-interval-ms: ${SSE_HEARTBEAT_MS:30000}
  eval:
    default-result: ${EVAL_DEFAULT_RESULT:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.flag: ${LOG_LEVEL:INFO}