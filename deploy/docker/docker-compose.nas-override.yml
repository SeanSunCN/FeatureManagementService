version: "3.8"

# ============================================================
# NAS network override configuration
#
# Middleware runs on NAS (192.168.5.66) in the infra_net,
# microservices run on the local Docker host, resolving NAS hostnames via extra_hosts.
# PostgreSQL on NAS maps external port 15432 → container port 5432.
# ============================================================

services:
  flag-admin-api:
    extra_hosts:
      - "dev_postgres:192.168.5.66"
      - "dev_redis:192.168.5.66"
    environment:
      - DB_PORT=15432
      - DB_PASSWORD=666666

  flag-eval-service:
    extra_hosts:
      - "dev_postgres:192.168.5.66"
      - "dev_redis:192.168.5.66"
    environment:
      - DB_PORT=15432
      - DB_PASSWORD=666666

  flag-ingest-service:
    extra_hosts:
      - "dev_redis:192.168.5.66"
      - "dev_kafka:192.168.5.66"

  flag-metrics-worker:
    extra_hosts:
      - "dev_redis:192.168.5.66"
      - "dev_kafka:192.168.5.66"
    environment:
      - CLICKHOUSE_HOST=192.168.5.66
      - CLICKHOUSE_USERNAME=dev
      - CLICKHOUSE_PASSWORD=E96I3N6RokvAujGXWghCBcfL
