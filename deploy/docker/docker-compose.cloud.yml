version: "3.8"

# ============================================================
# Feature Management Service — Alibaba Cloud Deployment
#
# Self-contained Docker Compose for a single cloud server.
# Includes both middleware (PostgreSQL / Redis / Kafka / ClickHouse)
# and all 4 microservices.
#
# Usage:
#   cd <project-root>
#   docker compose -f deploy/docker/docker-compose.cloud.yml up -d
#
# Verification:
#   docker compose -f deploy/docker/docker-compose.cloud.yml ps
#   curl http://localhost:8080/actuator/health
# ============================================================

services:

  # ===================== Middleware =====================

  postgres:
    image: postgres:16-alpine
    container_name: flag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flag_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flag-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - flag_net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: flag-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper)
      CLUSTER_ID: "flag-cluster-01"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:9092,
        CONTROLLER://0.0.0.0:9093,
        INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://flag-kafka:9092,
        INTERNAL://flag-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        CONTROLLER:PLAINTEXT,
        INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Log / storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - flag_net
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: flag-clickhouse
    ports:
      - "8123:8123"   # HTTP (JDBC driver)
      - "9000:9000"   # Native protocol
    environment:
      CLICKHOUSE_DB: dev
      CLICKHOUSE_USER: dev
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dev123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhousedata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flag_net
    restart: unless-stopped

  # ===================== Microservices =====================

  flag-admin-api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.admin-api
    container_name: flag-admin-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=flag-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=flag-redis
      - REDIS_PORT=6379
      - HOST_IP=${HOST_IP:-}
      - JPA_SHOW_SQL=false
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flag_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  flag-eval-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.eval-service
    container_name: flag-eval-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=flag-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=flag-redis
      - REDIS_PORT=6379
      - HOST_IP=${HOST_IP:-}
      - SSE_HEARTBEAT_MS=30000
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flag_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  flag-ingest-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.ingest-service
    container_name: flag-ingest-service
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=flag-redis
      - REDIS_PORT=6379
      - KAFKA_HOST=flag-kafka
      - KAFKA_PORT=9092
      - HOST_IP=${HOST_IP:-}
      - AUDIT_LOG_TIMEOUT_MS=200
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - flag_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  flag-metrics-worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.metrics-worker
    container_name: flag-metrics-worker
    ports:
      - "8083:8083"
    environment:
      - REDIS_HOST=flag-redis
      - REDIS_PORT=6379
      - KAFKA_HOST=flag-kafka
      - KAFKA_PORT=9092
      - CLICKHOUSE_HOST=flag-clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USERNAME=dev
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-dev123}
      - HOST_IP=${HOST_IP:-}
      - FLUSH_INTERVAL_MS=10000
      - FLUSH_BATCH_SIZE=500
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - flag_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

# ===================== Volumes =====================

volumes:
  pgdata:
  redisdata:
  kafkadata:
  clickhousedata:

# ===================== Network =====================

networks:
  flag_net:
    driver: bridge