version: "3.8"

# ============================================================
# NAS local deployment -- all components communicate via infra_net
# ============================================================

services:
  flag-admin-api:
    image: docker-flag-admin-api:latest
    container_name: flag-admin-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=dev_postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=666666
      - REDIS_HOST=dev_redis
      - REDIS_PORT=6379
      - HOST_IP=192.168.5.66
      - JPA_SHOW_SQL=false
      - LOG_LEVEL=INFO
    networks:
      - infra_net
    restart: unless-stopped

  flag-eval-service:
    image: docker-flag-eval-service:latest
    container_name: flag-eval-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=dev_postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=666666
      - REDIS_HOST=dev_redis
      - REDIS_PORT=6379
      - HOST_IP=192.168.5.66
      - SSE_HEARTBEAT_MS=30000
      - LOG_LEVEL=INFO
    networks:
      - infra_net
    restart: unless-stopped

  flag-ingest-service:
    image: docker-flag-ingest-service:latest
    container_name: flag-ingest-service
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=dev_redis
      - REDIS_PORT=6379
      - KAFKA_HOST=dev_kafka
      - KAFKA_PORT=9092
      - HOST_IP=192.168.5.66
      - AUDIT_LOG_TIMEOUT_MS=200
      - LOG_LEVEL=INFO
    networks:
      - infra_net
    restart: unless-stopped

  flag-metrics-worker:
    image: docker-flag-metrics-worker:latest
    container_name: flag-metrics-worker
    ports:
      - "8083:8083"
    environment:
      - REDIS_HOST=dev_redis
      - REDIS_PORT=6379
      - KAFKA_HOST=dev_kafka
      - KAFKA_PORT=9092
      - CLICKHOUSE_HOST=dev_clickhouse
      # 8123 = ClickHouse HTTP port (JDBC). Native port 9000 mapped to 19000 on NAS.
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USERNAME=dev
      - CLICKHOUSE_PASSWORD=E96I3N6RokvAujGXWghCBcfL
      - HOST_IP=192.168.5.66
      - FLUSH_INTERVAL_MS=10000
      - FLUSH_BATCH_SIZE=500
      - LOG_LEVEL=INFO
    networks:
      - infra_net
    restart: unless-stopped

networks:
  infra_net:
    external: true
