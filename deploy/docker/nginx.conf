server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    #  Manifest 鈥?ALWAYS fresh, never cached
    #  The Web SDK appends ?t=timestamp to crush any intermediate
    #  proxy or browser cache.
    # ============================================================
    location /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Also disable ETag / Last-Modified so the client always re-fetches
        etag off;
        if_modified_since off;
    }

    # ============================================================
    #  Rules payload 鈥?MAXIMAL cache (1 year)
    #  rules.<version>.json is content-hash-named, so a new version
    #  is a completely new URL 鈫?never a stale-overwrite problem.
    #  Browser will keep it in Disk Cache for a full year.
    # ============================================================
    location ~* ^/rules\.[0-9]+\.json$ {
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header X-Cache-Status "HIT-FROM-CDN" always;
        expires 365d;
        access_log off;
    }

    # ============================================================
    #  SDK JS 鈥?medium cache, versioned by ?t= or future hash
    # ============================================================
    location /feature-flag-web-sdk.js {
        add_header Cache-Control "public, max-age=3600" always;
        expires 1h;
    }

    # ============================================================
    #  Static assets (html, images) 鈥?short cache
    # ============================================================
    location / {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ =404;
    }

    # ============================================================
    #  Debug endpoint: show request headers
    # ============================================================
    location /__headers {
        return 200 "$http_x_forwarded_for\n$http_user_agent\n$http_cache_control\n";
        add_header Content-Type text/plain;
    }
}

