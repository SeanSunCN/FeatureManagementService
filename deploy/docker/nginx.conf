server {
    listen 80;
    server_name localhost;

    # Static assets (HTML, JS, images) live in /usr/share/nginx/web/
    root /usr/share/nginx/web;
    index index.html;

    # ============================================================
    #  Generated assets (manifest.json, rules.*.json) come from cdn_root
    #  We use a separate root via regex so /rules.*.json bypasses the main root.
    # ============================================================
    location ~* ^/(manifest\.json|rules\.[0-9]+\.json)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header X-Cache-Status "HIT-FROM-CDN" always;
        expires 365d;
        access_log off;
    }

    # Override manifest cache to no-store (must always be fresh)
    location = /manifest.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        etag off;
        if_modified_since off;
    }

    # ============================================================
    #  SDK JS — medium cache, versioned by ?t= or future hash
    # ============================================================
    location /feature-flag-web-sdk.js {
        add_header Cache-Control "public, max-age=3600" always;
        expires 1h;
    }

    # ============================================================
    #  Static assets (html, images) — short cache
    #  Served from root /usr/share/nginx/web/
    # ============================================================
    location / {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ =404;
    }

    # ============================================================
    #  Debug endpoint: show request headers
    # ============================================================
    location /__headers {
        return 200 "$http_x_forwarded_for\n$http_user_agent\n$http_cache_control\n";
        add_header Content-Type text/plain;
    }
}
